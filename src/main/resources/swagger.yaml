# OpenAPI 3.0 specification (file named as swagger.yaml per project convention)
openapi: 3.0.3
info:
  title: Book Pricing API
  version: 1.0.0

paths:
  /api/pricing/v1/calculatePrice:
    post:
      summary: Calculate price
      operationId: calculatePrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'

components:
  schemas:

    BasketRequest:
      type: object
      properties:
        items:
          type: object
          additionalProperties:
            type: integer
      required:
        - items

    PriceResponse:
      type: object
      properties:
        basketSummary:
          $ref: '#/components/schemas/BasketSummary'
        pricing:
          $ref: '#/components/schemas/Pricing'
      required:
        - basketSummary
        - pricing

    BasketSummary:
      type: object
      properties:
        totalItems:
          type: integer
        uniqueBooks:
          type: integer
      required:
        - totalItems
        - uniqueBooks

    Pricing:
      type: object
      properties:
        basePrice:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        finalPrice:
          type: number
          format: double
      required:
        - basePrice
        - discountAmount
        - finalPrice